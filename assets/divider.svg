<svg xmlns="http://www.w3.org/2000/svg" width="900" height="20" viewBox="0 0 900 20">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="15%" style="stop-color:#79c0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c481ff;stop-opacity:1" />
      <stop offset="85%" style="stop-color:#79c0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .dash { stroke-dasharray: 10, 10; animation: dashAnim 20s linear infinite; }
      @keyframes dashAnim { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }
    </style>
  </defs>
  <line x1="0" y1="10" x2="900" y2="10" stroke="url(#grad)" stroke-width="2" class="dash" filter="url(#glow)" />
</svg>